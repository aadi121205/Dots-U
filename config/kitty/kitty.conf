# Pass workspace shortcuts to window manager
map super+comma no_op
map super+period no_op
map super+bracketleft no_op
map super+bracketright no_op

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Cursor
cursor_shape               beam
cursor_beam_thickness      1.5
cursor_blink_interval      0.5
cursor_stop_blinking_after 10.0

# Scrollback
scrollback_lines 10000

# Window
hide_window_decorations yes
remember_window_size    yes
startup_session         none
window_padding_width    16
window_margin_width     0

# Colors — dark grey base
background  #1a1a20
foreground  #cdd6f4
cursor      #f5c2e7
selection_background #585b70

# Subtle grey tint with low opacity (blur does the heavy lifting)
background_opacity 0.76
background_blur    47

wayland_titlebar_color background

# Tab bar
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            2
active_tab_foreground       #1e1e2e
active_tab_background       #cba6f7
inactive_tab_foreground     #cdd6f4
inactive_tab_background     #313244

# Bell
enable_audio_bell no
visual_bell_duration 0.1

# Fix double-key events in Neovim: bypass extended keyboard protocol
map enter     send_text all \r
map backspace send_text all \x7f
map tab       send_text all \t
map delete    send_text all \x1b[3~
